name: NodeSeek 自动签到

on:
  workflow_dispatch:  # 支持手动触发
  schedule:
    - cron: '30 16 * * *'  # UTC 16:30，即北京时间 00:30

jobs:
  run-nodeseek-daily:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Chrome and dependencies
        run: |
          # 安装依赖
          sudo apt-get update
          sudo apt-get install -y wget gnupg xvfb
          
          # 添加 Google Chrome 官方源
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          
          # 安装稳定版 Chrome
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
          
          echo "Chrome version:"
          google-chrome --version

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run NodeSeek script
        env:
          NS_COOKIE: ${{ secrets.NS_COOKIE }}
          NS_RANDOM: ${{ secrets.NS_RANDOM }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          HEADLESS: "true"
        run: |
          xvfb-run --auto-servernum python nodeseek_daily.py
