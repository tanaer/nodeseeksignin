version: '3.8'

services:
  # MicroWARP 提供 Cloudflare WARP 出口代理，避免服务器 IP 被 NodeSeek 阻断
  warp:
    image: ghcr.io/ccbkkb/microwarp:latest
    restart: always
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun:/dev/net/tun

  # 执行日常签到、水贴、顶贴和监控检查的常驻爬虫守护进程
  nodeseek-daemon:
    build: .
    restart: always
    environment:
      # Upstash Redis 连接串
      - REDIS_URL=${REDIS_URL}
      - TG_BOT_TOKEN=${TG_BOT_TOKEN}
      # HTTP / HTTPS 请求全部走 WARP 代理，绕过 CF 被拦概率 (MicroWARP 仅支持 SOCKS5)
      - SOCKS_PROXY=socks5://warp:1080
    depends_on:
      - warp
